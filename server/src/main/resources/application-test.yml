spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://${EAH_TEST_DB_HOST:localhost}:${EAH_TEST_DB_PORT:5432}/${EAH_TEST_DB_NAME:enterprise_agent_hub_test}
    username: ${EAH_TEST_DB_USERNAME:eah_test}
    password: ${EAH_TEST_DB_PASSWORD:eah_test_password}
  flyway:
    clean-disabled: false
  jpa:
    hibernate:
      ddl-auto: validate

enterprise-agent:
  package-storage:
    root: ${EAH_TEST_STORAGE_ROOT:${java.io.tmpdir}/enterprise-agent-hub-test-storage}
    max-compressed-size: 5242880
    max-uncompressed-size: 20971520
    max-single-file-size: 2097152
    max-file-count: 100
    preview-max-bytes: 262144
    temp-ttl: 24h
    ticket-ttl: 10m
